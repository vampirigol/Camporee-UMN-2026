<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registros · Camporee UMN 2026</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #eff6ff;
  --success: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 8px 24px rgba(0,0,0,.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.5; min-height: 100vh;
}

/* ── Nav ──────────────────────────────────────────────────────── */
nav {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
  padding: 0 28px;
  display: flex; align-items: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.35);
  min-height: 60px;
}
.nav-brand {
  flex: 1; display: flex; align-items: center; gap: 12px;
  text-decoration: none;
}
.nav-logo {
  height: 42px; width: 42px; object-fit: contain;
  border-radius: 8px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
.nav-brand-text { display: flex; flex-direction: column; line-height: 1.25; }
.nav-brand-title { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: .3px; }
.nav-brand-sub   { font-size: 11px; color: #7dd3fc; font-weight: 500; }
.nav-links { display: flex; }
.nav-link {
  color: #94a3b8; text-decoration: none;
  padding: 0 16px; height: 60px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  transition: color .15s, background .15s;
  border-bottom: 3px solid transparent; white-space: nowrap;
}
.nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,.07); }
.nav-link.active { color: #fff; border-bottom-color: #38bdf8; background: rgba(56,189,248,.08); }

/* ── Page ─────────────────────────────────────────────────────── */
.page { max-width: 1080px; margin: 0 auto; padding: 28px 16px 60px; }

/* ── Stats ────────────────────────────────────────────────────── */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-bottom: 22px;
}
@media (max-width: 680px) { .stats-row { grid-template-columns: 1fr 1fr; } }
.stat-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
}
.stat-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.stat-icon.blue   { background: #dbeafe; }
.stat-icon.green  { background: #d1fae5; }
.stat-icon.purple { background: #ede9fe; }
.stat-icon.red    { background: #fee2e2; }
.stat-num  { font-size: 26px; font-weight: 800; line-height: 1; color: var(--text); }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

/* ── Toolbar ──────────────────────────────────────────────────── */
.toolbar {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px 18px;
  margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.search-wrap input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 8px 12px 8px 34px; font: inherit; font-size: 14px; transition: border-color .2s;
}
.search-wrap input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
select.filter {
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 8px 12px; font: inherit; font-size: 14px;
  background: #fff; color: var(--text); cursor: pointer;
}
select.filter:focus { outline: none; border-color: var(--primary); }
.btn-refresh {
  background: var(--primary); color: #fff; border: none; border-radius: 10px;
  padding: 8px 16px; font: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s;
}
.btn-refresh:hover { background: var(--primary-dark); }
.btn-excel {
  background: #16a34a; color: #fff; border: none; border-radius: 10px;
  padding: 8px 16px; font: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s, opacity .15s;
  white-space: nowrap;
}
.btn-excel:hover { background: #15803d; }
.btn-excel:disabled { opacity: .6; cursor: not-allowed; }
.result-count { font-size: 12px; color: var(--muted); width: 100%; padding-top: 2px; }

/* ── Patient card ─────────────────────────────────────────────── */
.pac-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  border: 1.5px solid var(--border); margin-bottom: 12px;
  transition: border-color .2s, box-shadow .2s;
}
.pac-card:hover { border-color: #93c5fd; box-shadow: 0 4px 24px rgba(37,99,235,.1); }

.pac-header {
  padding: 14px 20px; display: flex; align-items: center;
  gap: 14px; cursor: pointer; transition: background .15s;
}
.pac-header:hover { background: #fafbff; }

.pac-avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 900; font-size: 14px; letter-spacing: -.5px;
}
.pac-info { flex: 1; min-width: 0; }
.pac-nombre { font-weight: 700; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pac-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
.pac-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.badge-n {
  background: #dbeafe; color: #1d4ed8;
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; font-weight: 800; white-space: nowrap;
}
.chevron { color: #94a3b8; transition: transform .25s; font-size: 11px; }
.pac-card.open .chevron { transform: rotate(180deg); }

/* ── Consultas wrap ───────────────────────────────────────────── */
.consultas-wrap { display: none; border-top: 1.5px solid var(--border); }
.pac-card.open .consultas-wrap { display: block; }

.tab-bar {
  display: flex; background: #f8fafc;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; padding: 0 20px; gap: 2px;
}
.c-tab {
  padding: 10px 18px; font-size: 13px; font-weight: 700;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 3px solid transparent; transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 6px;
}
.c-tab:hover { color: var(--text); }
.c-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.c-tab .dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--border);
}
.c-tab.active .dot { background: var(--primary); }

.c-panels { }
.c-panel { display: none; }
.c-panel.active { display: block; }

/* ── Ficha ────────────────────────────────────────────────────── */
.ficha { padding: 24px; }

/* Patient ribbon */
.ficha-ribbon {
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(135deg, #1e293b 0%, #1e3a5f 100%);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 22px; color: #fff;
}
.ficha-ribbon-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.25);
}
.ficha-ribbon-name { font-size: 16px; font-weight: 800; letter-spacing: -.3px; }
.ficha-ribbon-sub { font-size: 12px; color: #93c5fd; margin-top: 2px; }
.ficha-ribbon-num {
  margin-left: auto; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 8px; padding: 6px 14px; text-align: center; flex-shrink: 0;
}
.ficha-ribbon-num .nc { font-size: 18px; font-weight: 900; }
.ficha-ribbon-num .nl { font-size: 10px; color: #93c5fd; text-transform: uppercase; letter-spacing: .5px; }

/* Section blocks */
.ficha-block { margin-bottom: 20px; }
.ficha-block-title {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--primary);
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 2px solid #e0eaff;
}

/* 3-col grid for patient data */
.info-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.info-grid.g2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 600px) {
  .info-grid { grid-template-columns: 1fr 1fr; }
  .info-grid.g2 { grid-template-columns: 1fr; }
}
.span2 { grid-column: span 2; }
.span3 { grid-column: 1 / -1; }

.f-field { }
.f-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; display: block;
}
.f-val {
  font-size: 14px; color: var(--text); font-weight: 500;
  background: #f8fafc; border-radius: 8px;
  padding: 8px 11px; min-height: 36px; line-height: 1.4;
  border: 1px solid #edf2f7;
}
.f-val.empty { color: #c0ccda; font-style: italic; font-weight: 400; }
.f-val.hi    { background: #eff6ff; color: #1d4ed8; font-weight: 700; border-color: #bfdbfe; }
.f-val.warn  { background: #fff7ed; color: #c2410c; font-weight: 700; border-color: #fed7aa; }
.f-val.red   { background: #fff1f2; color: #be123c; font-weight: 700; border-color: #fecdd3; }

/* Vitals row */
.vitals-strip {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0;
}
.vital-box {
  background: #fff; border: 1.5px solid #e2e8f0;
  border-radius: 10px; padding: 10px 16px; text-align: center;
  min-width: 80px; flex: 1;
}
.vital-box .vl { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; }
.vital-box .vv { font-size: 20px; font-weight: 900; color: var(--text); line-height: 1.1; margin: 2px 0; }
.vital-box .vu { font-size: 9px; color: var(--muted); font-weight: 600; }

/* Transfer box */
.transfer-box {
  border: 2px solid #fecaca; border-radius: 12px;
  background: #fff5f5; overflow: hidden;
}
.transfer-head {
  background: #fee2e2; padding: 10px 16px;
  font-weight: 800; font-size: 14px; color: #991b1b;
  display: flex; align-items: center; gap: 8px;
}
.transfer-body { padding: 16px; }

/* Actions bar */
.ficha-actions {
  display: flex; gap: 8px; padding: 14px 24px;
  border-top: 1px solid var(--border); flex-wrap: wrap;
  background: #fafbff;
}
.btn {
  border: none; border-radius: 8px; padding: 8px 16px;
  font: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .15s, transform .1s;
}
.btn:active { transform: scale(.97); }
.btn-dark    { background: #1e293b; color: #fff; }
.btn-dark:hover { background: #0f172a; }
.btn-ghost   { background: #f1f5f9; color: var(--text); }
.btn-ghost:hover { background: #e2e8f0; }
.btn-green   { background: var(--success); color: #fff; }
.btn-green:hover { background: #059669; }

/* ── Empty / Loading ──────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 64px 0; color: var(--muted);
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
}
.empty-state .big { font-size: 48px; margin-bottom: 12px; }
.loading-state { text-align: center; padding: 48px; color: var(--muted); }
.spinner {
  width: 32px; height: 32px; margin: 0 auto 14px;
  border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: #1e293b; color: #fff; border-radius: 12px; padding: 12px 18px;
  display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.2); transition: opacity .3s, transform .3s;
  opacity: 0; transform: translateY(16px); pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast.s { border-left: 4px solid var(--success); }
.toast.e { border-left: 4px solid var(--danger); }

/* ── PRINT STYLES (popup window) ────────────── see printConsulta() ─── */
@media print {
  nav, .toolbar, .stats-row, .tab-bar, .ficha-actions,
  .pac-header, .btn { display: none !important; }
  body { background: #fff !important; }
  .pac-card { box-shadow: none !important; border: none !important; }
  .c-panel { display: block !important; }
  .page { padding: 0 !important; max-width: 100% !important; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <img class="nav-logo" src="logocamporee.png" alt="Camporee UMN 2026" onerror="this.style.display='none'" />
    <div class="nav-brand-text">
      <span class="nav-brand-title">Camporee UMN 2026</span>
      <span class="nav-brand-sub">Clínica de Emergencias Médicas</span>
    </div>
  </a>
  <div class="nav-links">

        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      Ver Registros
    </a>
  </div>
</nav>

<div id="toast" class="toast s"><span id="toastMsg"></span></div>

<div class="page">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon blue">👥</div>
      <div><div class="stat-num" id="sPacientes">—</div><div class="stat-label">Pacientes</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">📋</div>
      <div><div class="stat-num" id="sConsultas">—</div><div class="stat-label">Consultas totales</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">📅</div>
      <div><div class="stat-num" id="sHoy">—</div><div class="stat-label">Hoy</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">🚑</div>
      <div><div class="stat-num" id="sTraslados">—</div><div class="stat-label">Traslados</div></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar paciente por nombre…" oninput="doFilter()" />
    </div>
    <select class="filter" id="filterAsoc" onchange="doFilter()">
      <option value="">Todas las asociaciones</option>
      <option>Asociación Norte de Tamaulipas</option>
      <option>Asociación de Baja California</option>
      <option>Misión Baja California Sur</option>
      <option>Asociación de Sonora</option>
      <option>Asociación del Noreste</option>
      <option>Misión "A" Noroccidental</option>
      <option>Asociación del Golfo</option>
      <option>Asociación de Occidente</option>
      <option>Asociación de Chihuahua</option>
      <option>Asociación de Sinaloa</option>
      <option>Asociación Regiomontana</option>
      <option>STAFF</option>
      <option>OTRO</option>
    </select>
    <button class="btn-refresh" onclick="init()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Actualizar
    </button>
    <button class="btn-excel" id="btnExcel" onclick="downloadExcel()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Descargar Excel
    </button>
    <div class="result-count" id="resultCount"></div>
  </div>

  <!-- List -->
  <div id="listContainer">
    <div class="loading-state"><div class="spinner"></div><p>Cargando registros…</p></div>
  </div>

</div>

<script>
const API_BASE = window.location.pathname.startsWith('/camporeemedical') ? '/camporeemedical' : '';
let allPacientes = [], consultasCache = {};

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt = null;
function toast(msg, type = 's') {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  loadStats();
  await loadPacientes();
}

async function loadStats() {
  try {
    const r = await fetch(`${API_BASE}/api/stats`);
    const s = await r.json();
    document.getElementById('sPacientes').textContent = s.total_pacientes ?? '—';
    document.getElementById('sConsultas').textContent = s.total_consultas ?? '—';
    document.getElementById('sHoy').textContent       = s.hoy ?? '—';
    document.getElementById('sTraslados').textContent = s.traslados ?? '—';
  } catch (_) {}
}

async function loadPacientes() {
  document.getElementById('listContainer').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><p>Cargando registros…</p></div>';
  try {
    const r = await fetch(`${API_BASE}/api/pacientes`);
    allPacientes = await r.json();
    doFilter();
  } catch (e) {
    document.getElementById('listContainer').innerHTML =
      '<div class="empty-state"><div class="big">⚠️</div><p>Error al cargar datos.</p></div>';
  }
}

// ── Filter ────────────────────────────────────────────────────────────────────
let _ft = null;
function doFilter() {
  clearTimeout(_ft);
  _ft = setTimeout(() => {
    const q    = document.getElementById('searchInput').value.toLowerCase().trim();
    const asoc = document.getElementById('filterAsoc').value;
    const filtered = allPacientes.filter(p => {
      if (q && !(p.nombre_completo || '').toLowerCase().includes(q)) return false;
      if (asoc && p.asociacion !== asoc) return false;
      return true;
    });
    document.getElementById('resultCount').textContent =
      filtered.length === allPacientes.length
        ? `${allPacientes.length} paciente(s) registrado(s)`
        : `${filtered.length} de ${allPacientes.length} pacientes`;
    renderList(filtered);
  }, 200);
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderList(list) {
  const cont = document.getElementById('listContainer');
  if (!list.length) {
    cont.innerHTML = '<div class="empty-state"><div class="big">🔍</div><p>No se encontraron pacientes.</p></div>';
    return;
  }
  cont.innerHTML = list.map(p => pacCard(p)).join('');
}

function initials(n) {
  return (n || '?').split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtDateFull(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-MX', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('es-MX', {
    weekday:'short', day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
}

function pacCard(p) {
  const id = p.id;
  const n  = p.total_consultas || 0;
  const tabs = Array.from({length:n}, (_,i) =>
    `<div class="c-tab ${i===0?'active':''}" id="tab-${id}-${i+1}" onclick="switchTab(${id},${i+1})">
      <div class="dot"></div> Consulta #${i+1}
    </div>`).join('');
  const panels = Array.from({length:n}, (_,i) =>
    `<div class="c-panel ${i===0?'active':''}" id="panel-${id}-${i+1}">
      <div class="loading-state"><div class="spinner"></div><p>Cargando…</p></div>
    </div>`).join('');

  return `<div class="pac-card" id="pac-${id}">
    <div class="pac-header" onclick="togglePac(${id})">
      <div class="pac-avatar">${esc(initials(p.nombre_completo))}</div>
      <div class="pac-info">
        <div class="pac-nombre">${esc(p.nombre_completo)}</div>
        <div class="pac-meta">
          ${p.asociacion ? `<span>📍 ${esc(p.asociacion)}</span>` : ''}
          ${p.club && p.club !== 'N/D' ? `<span>🏕 ${esc(p.club)}</span>` : ''}
          ${p.tipo_sangre ? `<span>🩸 ${esc(p.tipo_sangre)}</span>` : ''}
          <span>🕐 ${fmtDate(p.ultima_consulta)}</span>
        </div>
      </div>
      <div class="pac-badges">
        <span class="badge-n">${n} consulta${n!==1?'s':''}</span>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="consultas-wrap">
      ${n > 0 ? `<div class="tab-bar">${tabs}</div><div class="c-panels">${panels}</div>` : '<div style="padding:18px;color:var(--muted);font-size:13px;">Sin consultas.</div>'}
    </div>
  </div>`;
}

// ── Toggle ────────────────────────────────────────────────────────────────────
async function togglePac(id) {
  const card = document.getElementById(`pac-${id}`);
  const was = card.classList.contains('open');
  card.classList.toggle('open', !was);
  if (!was) await loadConsultas(id);
}

async function loadConsultas(id) {
  if (consultasCache[id]) { renderConsultas(id, consultasCache[id]); return; }
  try {
    const r = await fetch(`${API_BASE}/api/pacientes/${id}/consultas`);
    const data = await r.json();
    consultasCache[id] = data;
    renderConsultas(id, data);
  } catch (e) { toast('Error al cargar consultas','e'); }
}

function renderConsultas(id, consultas) {
  consultas.forEach((c, i) => {
    const num = c.numero_consulta || (i+1);
    const panel = document.getElementById(`panel-${id}-${num}`);
    if (panel) panel.innerHTML = fichaHTML(id, c, num);
  });
}

function switchTab(pid, num) {
  document.querySelectorAll(`[id^="tab-${pid}-"]`).forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`[id^="panel-${pid}-"]`).forEach(p => p.classList.remove('active'));
  const t = document.getElementById(`tab-${pid}-${num}`);
  const p = document.getElementById(`panel-${pid}-${num}`);
  if (t) t.classList.add('active');
  if (p) p.classList.add('active');
}

      ${c.indicaciones ? `<div class="f s3"><label>Indicaciones para el paciente</label><div class="v">${pv(c.indicaciones)}</div></div>` : ''}
    </div>
  </div>

  ${hasT ? `
  <div class="sec">
    <div class="tbox">
      <div class="thead">🚑 Traslado de Emergencia en Ambulancia</div>
      <div class="tbody">
        <div class="g3">
          ${hospital   ? `<div class="f"><label>Hospital de destino</label><div class="v">${pv(hospital)}</div></div>` : ''}
          ${motivo     ? `<div class="f"><label>Motivo de traslado</label><div class="v">${pv(motivo)}</div></div>` : ''}
          ${paramedic  ? `<div class="f"><label>Paramédico encargado</label><div class="v">${pv(paramedic)}</div></div>` : ''}
          ${firma      ? `<div class="f"><label>Firma de médico</label><div class="v">${pv(firma)}</div></div>` : ''}
          ${obs        ? `<div class="f s3"><label>Observación del traslado</label><div class="v">${pv(obs)}</div></div>` : ''}
        </div>
      </div>
    </div>
  </div>` : ''}

  <!-- Signatures -->
  <div class="sig-row">
    <div class="sig-box">
      <div class="sig-space"></div>
      <div class="sig-lbl">Firma del médico que atendió</div>
    </div>
    <div class="sig-box">
      <div class="sig-space"></div>
      <div class="sig-lbl">Nombre y firma del paciente / tutor</div>
    </div>
    <div class="sig-box">
      <div class="sig-space"></div>
      <div class="sig-lbl">Sello de la clínica</div>
    </div>
  </div>

</div>

<footer>
  <div><strong>Camporee de Conquistadores UMN 2026</strong> · Clínica Médica de Emergencias</div>
  <div>Consulta #${num} · ${fmtDateTime(c.created_at)} · Documento confidencial</div>
</footer>

<script>window.onload=()=>{window.print();}<\/script>
</body></html>`);
  w.document.close();
}

// ── Copy resumen ──────────────────────────────────────────────────────────────
async function copyResumen(pid, num) {
  const consultas = consultasCache[pid] || [];
  const c = consultas.find(x => (x.numero_consulta || 1) === num);
  if (!c) return;
  const txt = [
    `📋 FICHA MÉDICA — CAMPOREE UMN 2026`,
    `Consulta #${num} · ${fmtDateTime(c.created_at)}`,
    ``,
    `👤 Paciente: ${c.nombrecompleto || c.nombreCompleto || '—'}`,
    `📍 Asociación: ${c.asociacion || '—'} | Club: ${c.club || '—'}`,
    `🎂 Edad: ${c.edad || '—'} | Sangre: ${c.tiposangre || c.tipoSangre || '—'}`,
    ``,
    `🩺 Síntomas: ${c.sintomas || '—'}`,
    `🔷 Diagnóstico: ${c.diagnostico || '—'}`,
    `💊 TX/Medicamentos: ${c.tx || '—'}`,
    `📌 Indicaciones: ${c.indicaciones || '—'}`,
    `👨‍⚕️ Médico: ${c.medico || '—'}`,
  ].join('\n');
  try {
    await navigator.clipboard.writeText(txt);
    toast('Resumen copiado ✓');
  } catch (_) { toast('No se pudo copiar','e'); }
}

// ── Download Excel ────────────────────────────────────────────────────────────
async function downloadExcel() {
  const btn = document.getElementById('btnExcel');
  btn.disabled = true;
  btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargando…`;

  try {
    const pacientes = allPacientes.length ? allPacientes : await fetch(`${API_BASE}/api/pacientes`).then(r => r.json());

    const rows = [];

    for (const p of pacientes) {
      let consultas = consultasCache[p.id];
      if (!consultas) {
        try {
          const r = await fetch(`${API_BASE}/api/pacientes/${p.id}/consultas`);
          consultas = await r.json();
          consultasCache[p.id] = consultas;
        } catch (_) { consultas = []; }
      }

      if (!consultas.length) {
        rows.push({
          'ID Paciente':        p.id,
          '# Consulta':         '—',
          'Nombre completo':    p.nombre_completo || '—',
          'Edad':               '—',
          'Fecha nacimiento':   '—',
          'Tipo de sangre':     '—',
          'Asociación':         p.asociacion || '—',
          'Club':               p.club || '—',
          'Tel. emergencia':    '—',
          'Médico que atendió': '—',
          'Fecha de atención':  '—',
          'TA (mmHg)':          '—',
          'FC (lpm)':           '—',
          'FR (rpm)':           '—',
          'Temp (°C)':          '—',
          'Glucosa (mg/dL)':    '—',
          'SpO2 (%)':           '—',
          'Síntomas':           '—',
          'Evento previo':      '—',
          'Antecedentes':       '—',
          'Alergias':           '—',
          'Medicamentos':       '—',
          'Diagnóstico':        '—',
          'Tratamiento (TX)':   '—',
          'Indicaciones':       '—',
          'Requiere traslado':  'No',
          'Hospital destino':   '—',
          'Motivo traslado':    '—',
          'Paramédico':         '—',
          'Observación traslado':'—',
        });
      } else {
        for (const c of consultas) {
          const hasT = !!(c.requiereambulancia || c.requiereAmbulancia);
          rows.push({
            'ID Paciente':        p.id,
            '# Consulta':         c.numero_consulta || '—',
            'Nombre completo':    c.nombrecompleto || c.nombreCompleto || p.nombre_completo || '—',
            'Edad':               c.edad ? `${c.edad} años` : '—',
            'Fecha nacimiento':   c.fechanacimiento || c.fechaNacimiento || '—',
            'Tipo de sangre':     c.tiposangre || c.tipoSangre || '—',
            'Asociación':         c.asociacion || p.asociacion || '—',
            'Club':               c.club && c.club !== 'N/D' ? c.club : (p.club || '—'),
            'Tel. emergencia':    c.numeroemergencia || c.numeroEmergencia || '—',
            'Médico que atendió': c.medico || '—',
            'Fecha de atención':  c.created_at ? new Date(c.created_at).toLocaleString('es-MX') : '—',
            'TA (mmHg)':          c.ta || '—',
            'FC (lpm)':           c.fc || '—',
            'FR (rpm)':           c.fr || '—',
            'Temp (°C)':          c.temp || '—',
            'Glucosa (mg/dL)':    c.glucosa || '—',
            'SpO2 (%)':           c.spo2 || '—',
            'Síntomas':           c.sintomas || '—',
            'Evento previo':      c.eventoprevio || c.eventoPrevio || '—',
            'Antecedentes':       c.antecedentes || '—',
            'Alergias':           c.alergias || '—',
            'Medicamentos':       c.medicamentos || '—',
            'Diagnóstico':        c.diagnostico || '—',
            'Tratamiento (TX)':   c.tx || '—',
            'Indicaciones':       c.indicaciones || '—',
            'Requiere traslado':  hasT ? 'Sí' : 'No',
            'Hospital destino':   c.hospitaldestino || c.hospitalDestino || '—',
            'Motivo traslado':    c.motivotraslado || c.motivoTraslado || '—',
            'Paramédico':         c.paramedico || '—',
            'Observación traslado': c.observaciontraslado || c.observacionTraslado || '—',
          });
        }
      }
    }

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(rows);

    ws['!cols'] = [
      { wch: 10 }, { wch: 10 }, { wch: 30 }, { wch: 10 }, { wch: 16 },
      { wch: 14 }, { wch: 30 }, { wch: 22 }, { wch: 16 }, { wch: 22 },
      { wch: 22 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 10 },
      { wch: 14 }, { wch: 10 }, { wch: 35 }, { wch: 35 }, { wch: 35 },
      { wch: 25 }, { wch: 30 }, { wch: 35 }, { wch: 35 }, { wch: 35 },
      { wch: 16 }, { wch: 25 }, { wch: 30 }, { wch: 22 }, { wch: 35 },
    ];

    XLSX.utils.book_append_sheet(wb, ws, 'Registros');

    const fecha = new Date().toLocaleDateString('es-MX', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'-');
    XLSX.writeFile(wb, `Camporee_UMN_2026_Registros_${fecha}.xlsx`);
    toast(`Excel descargado · ${rows.length} fila(s)`);
  } catch (e) {
    toast('Error al generar el Excel', 'e');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar Excel`;
  }
}

// ── Helper ────────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
